<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>How do we keep safe on the road?</title>
    
    <link rel="stylesheet" href="https://lib.baomitu.com/pannellum/2.5.6/pannellum.css"/>
    <script type="text/javascript" src="https://lib.baomitu.com/pannellum/2.5.6/pannellum.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: "Arial", sans-serif; }
        
        /* 1. 让全景容器默认直接占满屏幕 */
        #panorama { width: 100%; height: 100vh; }

        #debug-panel {
            position: fixed; bottom: 20px; right: 20px; background: rgba(0,0,0,0.85);
            color: #00ff00; padding: 15px; border-radius: 10px; z-index: 10005;
            font-family: monospace; font-size: 14px; border: 1px solid #00ff00;
            pointer-events: none; display: none;
        }

        .hit-target { cursor: pointer; z-index: 5 !important; }
        .debug-visible { background-color: rgba(255, 0, 0, 0.4) !important; border: 1px solid white; }

        .bubble-container { display: none; position: absolute; top: 0; left: 50%; transform: translate(-50%, -125%); pointer-events: none; z-index: 100; }
        .cloud-wrapper { position: relative; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.15)); opacity: 0.95; }
        .cloud-main { position: relative; background: #fff; padding: 30px 45px; border-radius: 100px; min-width: 320px; text-align: center; z-index: 10; }
        .puff { position: absolute; background: #fff; border-radius: 50%; z-index: 5; }
        .pt1 { width: 100px; height: 100px; top: -40px; left: 30px; }
        .pt2 { width: 120px; height: 120px; top: -50px; left: 110px; }
        .pt3 { width: 90px; height: 90px; top: -35px; right: 40px; }
        .pb1 { width: 85px; height: 85px; bottom: -30px; left: 40px; }
        .pb2 { width: 100px; height: 100px; bottom: -40px; left: 110px; }
        .pb3 { width: 90px; height: 90px; bottom: -30px; right: 50px; }
        .pl { width: 95px; height: 95px; top: 15px; left: -30px; }
        .pr { width: 95px; height: 95px; top: 10px; right: -30px; }
        .cloud-tail { position: absolute; bottom: -55px; left: 25%; display: flex; flex-direction: column; align-items: center; }
        .dot { background: #fff; border-radius: 50%; margin-bottom: 6px; }
        .d1 { width: 25px; height: 22px; }
        .d2 { width: 15px; height: 13px; margin-left: -18px; }

        .text-content { font-size: 26px; font-weight: 900; color: #000; line-height: 1.35; position: relative; z-index: 20; font-family: "Georgia", serif; }
        .red-txt { color: #ff0000; }
        .zh-txt { font-weight: 900; display: inline-block; margin-top: 5px; font-family: "Microsoft YaHei", sans-serif; }

        .hit-target.activated .bubble-container { display: block; animation: cloudPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes cloudPop { from { opacity: 0; transform: translate(-50%, -90%) scale(0.6); } to { opacity: 1; transform: translate(-50%, -125%) scale(1); } }
        .pnlm-controls, .pnlm-load-button, .pnlm-about-msg, .pnlm-panorama-info { display: none !important; }
        .pnlm-hotspot-base { background: none !important; }
    </style>
</head>
<body>

<!-- 2. 只保留全景容器和调试面板，删除了 loader -->
<div id="panorama"></div>
<div id="debug-panel">坐标调试模式已开启<br>Pitch: 0.0, Yaw: 0.0</div>

<script>
    const debugMode = flase; 
    const imageUrl = "https://chencc2026.github.io/img2/pic.png";
    let viewer;

    // 3. 将初始化逻辑直接放入 window.onload，让页面加载完自动执行
    window.onload = function() {
        if(debugMode) document.getElementById('debug-panel').style.display = 'block';

        viewer = pannellum.viewer('panorama', {
            "type": "equirectangular",
            "panorama": imageUrl,
            "autoLoad": true,
            "showControls": false,
            "mouseZoom": false,
            "crossOrigin": "anonymous",
            "hotSpots": [
                {
                    "pitch": -2.16, "yaw": -60.34, 
                    "width": 300, "height": 350,
                    "cssClass": "hit-target",
                    "createTooltipFunc": buildCloud,
                    "createTooltipArgs": "The man <span class='red-txt'>watches the phone while walking</span>. <br><span class='zh-txt'>(走路看手机)</span>",
                    "clickHandlerFunc": active
                },
                {
                    "pitch": -27.09, "yaw": -108.2, 
                    "width": 300, "height": 300,
                    "cssClass": "hit-target",
                    "createTooltipFunc": buildCloud,
                    "createTooltipArgs": "The traffic light is red,the boy <span class='red-txt'>goes</span>.<br><span class='zh-txt'>(闯红灯)</span>",
                    "clickHandlerFunc": active
                },
                {
                    "pitch": -43.31, "yaw": -18.07, 
                    "width": 250, "height": 350,
                    "cssClass": "hit-target",
                    "createTooltipFunc": buildCloud,
                    "createTooltipArgs": "The boy <span class='red-txt'>plays</span> on the road.",
                    "clickHandlerFunc": active
                },
                {
                    "pitch": -58.45, "yaw": -113.61, 
                    "width": 250, "height": 300,
                    "cssClass": "hit-target",
                    "createTooltipFunc": buildCloud,
                    "createTooltipArgs": "The boy <span class='red-txt'>runs</span> on the road.",
                    "clickHandlerFunc": active
                },
                {
                    "pitch": -4.6, "yaw": 68.25, 
                    "width": 250, "height": 350,
                    "cssClass": "hit-target",
                    "createTooltipFunc": buildCloud,
                    "createTooltipArgs": "The man doesn't<br><span class='red-txt'>wear a helmet</span>. <br><span class='zh-txt'>(没戴头盔)</span>.",
                    "clickHandlerFunc": active
                },
                {
                    "pitch": -1.86, "yaw": 132.87, 
                    "width": 220, "height": 250,
                    "cssClass": "hit-target",
                    "createTooltipFunc": buildCloud,
                    "createTooltipArgs": "The man <span class='red-txt'>watches the phone while driving</span>. <br><span class='zh-txt'>(开车看手机)</span>",
                    "clickHandlerFunc": active
                }
            ]
        });

        viewer.on('mousedown', function(event) {
            if(!debugMode) return;
            const coords = viewer.mouseEventToCoords(event);
            document.getElementById('debug-panel').innerHTML = `调试模式<br>Pitch: ${coords[0].toFixed(2)}<br>Yaw: ${coords[1].toFixed(2)}`;
        });
    };

    function buildCloud(hotSpotDiv, args) {
        const config = viewer.getConfig().hotSpots.find(h => h.createTooltipArgs === args);
        if(config) {
            hotSpotDiv.style.width = config.width + "px";
            hotSpotDiv.style.height = config.height + "px";
        }
        if(debugMode) hotSpotDiv.classList.add('debug-visible');

        const wrap = document.createElement('div');
        wrap.classList.add('bubble-container');
        wrap.innerHTML = `
            <div class="cloud-wrapper">
                <div class="puff pt1"></div><div class="puff pt2"></div><div class="puff pt3"></div>
                <div class="puff pb1"></div><div class="puff pb2"></div><div class="puff pb3"></div>
                <div class="puff pl"></div><div class="puff pr"></div>
                <div class="cloud-main"><div class="text-content">${args}</div></div>
                <div class="cloud-tail"><div class="dot d1"></div><div class="dot d2"></div></div>
            </div>
        `;
        hotSpotDiv.appendChild(wrap);
    }

    function active(event) {
        const target = event.target.closest('.hit-target');
        if (target) target.classList.add('activated');
    }
</script>

</body>
</html>
