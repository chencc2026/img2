<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>How do we keep safe on the road?</title>
    
    <!-- 引入库 -->
    <link rel="stylesheet" href="https://lib.baomitu.com/pannellum/2.5.6/pannellum.css"/>
    <script type="text/javascript" src="https://lib.baomitu.com/pannellum/2.5.6/pannellum.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #eee; }
        
        /* 启动界面 */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10000;
        }
        .btn-start {
            background: #ff4757; color: white; padding: 20px 50px; border: none;
            border-radius: 50px; cursor: pointer; font-size: 24px; font-weight: bold;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.3); transition: 0.3s;
        }
        .btn-start:hover { transform: scale(1.05); background: #ff6b81; }

        /* 全景容器 */
        #panorama { width: 100%; height: 100vh; display: none; }

        /* 卡通弹窗样式 */
        #popup-box {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); background: white;
            padding: 30px; border-radius: 30px; border: 8px solid #54a0ff;
            box-shadow: 0 15px 50px rgba(0,0,0,0.3); z-index: 10002;
            text-align: center; min-width: 400px;
        }
        #pop-en { font-size: 26px; font-weight: 900; color: #2f3542; margin-bottom: 10px; line-height: 1.3; }
        #pop-zh { font-size: 22px; font-weight: bold; color: #ff4757; }
        .btn-ok { margin-top: 25px; padding: 10px 40px; border-radius: 10px; border: none; background: #2ed573; color: white; font-weight: bold; cursor: pointer; }

        #mask { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 10001; }

        /* 点击区域样式（优化尺寸兼容性，不强制固定宽高导致错位） */
        .hit-target {
            background-color: rgba(255, 0, 0, 0) !important; 
            border-radius: 10px;
            cursor: pointer;
            min-width: 200px !important; /* 保留你的尺寸，改min-width避免错位 */
            min-height: 300px !important; /* 保留你的尺寸，改min-height避免错位 */
            z-index: 5 !important;
        }

        .pnlm-controls, .pnlm-load-button, .pnlm-about-msg { display: none !important; }
    </style>
</head>
<body>

<div id="loader">
    <h1 style="margin-bottom:30px; color: #2f3542;">How do we keep safe on the road?</h1>
    <button class="btn-start" onclick="startExperience()">start</button>
</div>

<div id="panorama"></div>

<div id="mask" onclick="hidePopup()"></div>
<div id="popup-box">
    <div id="pop-en"></div>
    <div id="pop-zh"></div>
    <button class="btn-ok" onclick="hidePopup()">我知道了</button>
</div>

<script>
    // 保留你原有的图片地址，不修改！
    const imageUrl = "https://chencc2026.github.io/img2/pic.png";

    function startExperience() {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('panorama').style.display = 'block';
        
        // 初始化全景（核心：增加错误回调+跨域优化+加载兜底）
        pannellum.viewer('panorama', {
            "type": "equirectangular",
            "panorama": imageUrl, // 保留你的图片地址
            "autoLoad": true,
            "showControls": false,
            "mouseZoom": false,
            "crossOrigin": "anonymous",
            // 新增：图片加载失败时提示+恢复启动页
            "errorCallback": function(err) {
                alert("图片加载失败：" + (err.message || "请检查图片地址/网络/跨域配置"));
                console.error("全景加载错误：", err);
                // 加载失败后恢复启动页，避免空白
                document.getElementById('loader').style.display = 'flex';
                document.getElementById('panorama').style.display = 'none';
            },
            // 新增：加载成功回调（便于调试）
            "successCallback": function() {
                console.log("全景初始化成功，图片加载正常");
            },
            "hotSpots": [
                {
                    "pitch": -2.16, "yaw": -60.34,
                    "cssClass": "hit-target",
                    "clickHandlerFunc": openPopup,
                    "clickHandlerArgs": { "en": "The man watches the phone while walking.", "zh": "走路看手机" }
                },
                {
                    "pitch": -22.34, "yaw": -109.05,
                    "cssClass": "hit-target",
                    "clickHandlerFunc": openPopup,
                    "clickHandlerArgs": { "en": "The boy rides under 12.<br>The boy doesn't wear a helmet.", "zh": "12岁以下骑车 / 未戴头盔" }
                },
                {
                    "pitch": -54.10, "yaw": -22.45,
                    "cssClass": "hit-target",
                    "clickHandlerFunc": openPopup,
                    "clickHandlerArgs": { "en": "The boy plays on the road.", "zh": "在马路上玩耍" }
                },
                {
                    "pitch": 10.53, "yaw": 70.33,
                    "cssClass": "hit-target",
                    "clickHandlerFunc": openPopup,
                    "clickHandlerArgs": { "en": "The man doesn't wear a helmet.", "zh": "未戴头盔" }
                },
                {
                    "pitch": -1.86, "yaw": 132.87,
                    "cssClass": "hit-target",
                    "clickHandlerFunc": openPopup,
                    "clickHandlerArgs": { "en": "The man watches the phone while driving.", "zh": "开车看手机" }
                }
            ]
        });

        // 新增：5秒兜底检查（防止图片加载超时无提示）
        setTimeout(() => {
            const panoramaEl = document.getElementById('panorama');
            if (panoramaEl.offsetHeight === 0 && !document.getElementById('loader').style.display) {
                alert("图片加载超时，请检查地址是否有效或刷新页面");
                document.getElementById('loader').style.display = 'flex';
                document.getElementById('panorama').style.display = 'none';
            }
        }, 5000);
    }

    // 优化弹窗：防止事件冒泡导致点击热点时遮罩层误触发
    function openPopup(event, args) {
        event.stopPropagation(); // 新增：阻止事件冒泡
        document.getElementById('pop-en').innerHTML = args.en;
        document.getElementById('pop-zh').innerText = "(" + args.zh + ")";
        document.getElementById('popup-box').style.display = 'block';
        document.getElementById('mask').style.display = 'block';
    }

    // 优化弹窗隐藏：增加过渡，避免闪烁
    function hidePopup() {
        const popupBox = document.getElementById('popup-box');
        const mask = document.getElementById('mask');
        // 新增：渐变隐藏，提升体验
        popupBox.style.opacity = 0;
        mask.style.opacity = 0;
        setTimeout(() => {
            popupBox.style.display = 'none';
            mask.style.display = 'none';
            popupBox.style.opacity = 1;
            mask.style.opacity = 1;
        }, 300);
    }
</script>

</body>
</html>
